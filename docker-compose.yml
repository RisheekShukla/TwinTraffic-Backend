services:
  # ─── Infrastructure ───────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: shadow-postgres
    environment:
      POSTGRES_DB: shadowdb
      POSTGRES_USER: shadow
      POSTGRES_PASSWORD: shadow123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shadow -d shadowdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shadow-net

  redis:
    image: redis:7-alpine
    container_name: shadow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - shadow-net

  # ─── Mock Services ────────────────────────────────────────────────────────
  v1-mock-service:
    build:
      context: .
      dockerfile: v1-mock-service/Dockerfile
    container_name: v1-mock-service
    ports:
      - "8081:8081"
    networks:
      - shadow-net
    restart: on-failure

  v2-mock-service:
    build:
      context: .
      dockerfile: v2-mock-service/Dockerfile
    container_name: v2-mock-service
    ports:
      - "8082:8082"
    environment:
      V2_CHAOS_ENABLED: "true"
      V2_CHAOS_DELAY_MIN_MS: "2000"
      V2_CHAOS_DELAY_MAX_MS: "6000"
    networks:
      - shadow-net
    restart: on-failure

  # ─── Main Platform ────────────────────────────────────────────────────────
  shadow-platform:
    build:
      context: .
      dockerfile: shadow-platform/Dockerfile
    container_name: shadow-platform
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/shadowdb
      DB_USERNAME: shadow
      DB_PASSWORD: shadow123
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      V1_BASE_URL: http://v1-mock-service:8081
      V2_BASE_URL: http://v2-mock-service:8082
      SHADOW_ENABLED: "true"
      SHADOW_SAMPLING_RATE: "1.0"
      V2_TIMEOUT_MS: "5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      v1-mock-service:
        condition: service_started
      v2-mock-service:
        condition: service_started
    networks:
      - shadow-net
    restart: on-failure

volumes:
  postgres_data:

networks:
  shadow-net:
    driver: bridge
