shadow:
  enabled: true
  sampling-rate: 1.0
  v1-base-url: http://v1-mock-service:8081
  v2-base-url: http://v2-mock-service:8082
  v2-timeout-ms: 5000

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:shadowdb}
    username: ${DB_USERNAME:shadow}
    password: ${DB_PASSWORD:shadow123}
  data:
    redis:
      host: redis
      port: 6379

logging:
  level:
    com.shadowtool: DEBUG
