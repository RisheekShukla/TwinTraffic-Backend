spring:
  application:
    name: shadow-platform

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:shadowdb}
    username: ${DB_USERNAME:shadow}
    password: ${DB_PASSWORD:shadow123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

shadow:
  enabled: ${SHADOW_ENABLED:true}
  sampling-rate: ${SHADOW_SAMPLING_RATE:1.0}
  v1-base-url: ${V1_BASE_URL:http://localhost:8081}
  v2-base-url: ${V2_BASE_URL:http://localhost:8082}
  v2-timeout-ms: ${V2_TIMEOUT_MS:5000}

async:
  thread-pool:
    core-size: 10
    max-size: 50
    queue-capacity: 100
    thread-name-prefix: shadow-async-

logging:
  level:
    com.shadowtool: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
